<!DOCTYPE html>
<html>
<head>
<title>AI Voice Translator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎤 AI Voice Translator</h1>

<textarea id="inputText" placeholder="Your speech text"></textarea>

<select id="language">
<option value="es">Spanish</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="hi">Hindi</option>
<option value="te">Telugu</option>
<option value="ja">Japanese</option>
</select>

<div class="buttons">
<button onclick="startVoice()">🎤 Speak</button>
<button onclick="translateText()">🌐 Translate</button>
<button onclick="speakText()">🔊 Listen</button>
</div>

<textarea id="outputText" placeholder="Translated text"></textarea>

</div>

<script src="script.js"></script>

</body>
</html>
